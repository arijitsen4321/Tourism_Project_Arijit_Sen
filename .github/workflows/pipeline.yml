name: Tourism Project Pipeline

on:
push:
branches:
- main

jobs:

register-dataset:
runs-on: ubuntu-latest

steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.10"

  - name: Debug Repository Structure
    run: |
      echo "Current Directory"
      pwd

      echo "Repository Contents"
      find . -type f | sort

  - name: Install Dependencies
    run: |
      python -m pip install --upgrade pip
      pip install -r tourism_project/requirements.txt

  - name: Verify Script Exists
    run: |
      python -c "
      from pathlib import Path
      p = Path('tourism_project/model_building/data_register.py')
      print('Exists:', p.exists())
      print('Absolute:', p.resolve())
      "

  - name: Upload Dataset to Hugging Face Hub
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    run: |
      python tourism_project/model_building/data_register.py


data-prep:
needs: register-dataset
runs-on: ubuntu-latest


steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.10"

  - name: Install Dependencies
    run: |
      python -m pip install --upgrade pip
      pip install -r tourism_project/requirements.txt

  - name: Run Data Preparation
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    run: |
      python tourism_project/model_building/prep.py


model-training:
needs: data-prep
runs-on: ubuntu-latest


steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.10"

  - name: Install Dependencies
    run: |
      python -m pip install --upgrade pip
      pip install -r tourism_project/requirements.txt

  - name: Train Model
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    run: |
      python tourism_project/model_building/train.py


deploy-hosting:
needs: model-training
runs-on: ubuntu-latest


steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.10"

  - name: Install Dependencies
    run: |
      python -m pip install --upgrade pip
      pip install -r tourism_project/requirements.txt

  - name: Deploy Application
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    run: |
      python tourism_project/hosting/hosting.py

